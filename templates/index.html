<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận diện trái cây</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        .container {
            max-width: 800px;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        .card {
            border: none;
            border-radius: 32px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .fruit-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0f2f5;
            padding: 8px 16px;
            border-radius: 50px;
            margin: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3e66;
            transition: all 0.2s;
        }
        .fruit-badge i {
            font-size: 1.2rem;
        }
        .fruit-badge:hover {
            background: #d4e0f0;
            transform: scale(1.02);
        }
        .preview-img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            margin-top: 15px;
        }
        .result {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f6e43, #2b8c5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
        }
        .btn-predict {
            background: linear-gradient(90deg, #2b6e4e, #1e5940);
            border: none;
            padding: 12px 32px;
            font-weight: 600;
            border-radius: 60px;
            transition: all 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .btn-predict:hover {
            transform: scale(1.02);
            background: linear-gradient(90deg, #1e5940, #154e36);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
        .model-select {
            border-radius: 60px;
            padding: 12px 20px;
            background-color: #fff;
            border: 1px solid #ced4da;
            font-weight: 500;
        }
        .header-icon {
            font-size: 2.5rem;
            margin-right: 12px;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            color: #5c6f87;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <div class="text-center mb-3">
            <i class="fas fa-apple-alt header-icon" style="color:#e53e3e;"></i>
            <i class="fas fa-lemon header-icon" style="color:#fbbf24;"></i>
            <i class="fas fa-cherries header-icon" style="color:#b91c1c;"></i>
        </div>
        <h2 class="text-center fw-bold mb-2">🍍 Nhận diện 10 loại quả 🍊</h2>
        <p class="text-center text-muted mb-4">Hỗ trợ 3 mô hình AI: MobileNet, ResNet, EfficientNet</p>

        <!-- Danh sách 10 loại quả -->
        <div class="d-flex flex-wrap justify-content-center mb-4 p-2 bg-light rounded-4">
            <span class="fruit-badge">Táo</span>
            <span class="fruit-badge">Lê</span>
            <span class="fruit-badge">Dưa gang</span>
            <span class="fruit-badge">Dưa hấu</span>
            <span class="fruit-badge">Chanh vàng</span>
            <span class="fruit-badge">Chanh xanh</span>
            <span class="fruit-badge">Cam</span>
            <span class="fruit-badge">Quýt</span>
            <span class="fruit-badge">Cherry</span>
            <span class="fruit-badge">Mận</span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold"><i class="fas fa-microchip me-1"></i> 🤖 Chọn mô hình:</label>
            <select id="modelSelect" class="form-select model-select">
                <option value="mobilenet">MobileNetV2</option>
                <option value="resnet">ResNet34</option>
                <option value="efficientnet">EfficientNet-B0</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold"><i class="fas fa-cloud-upload-alt me-1"></i> 📸 Tải ảnh lên:</label>
            <input type="file" id="imageInput" class="form-control" accept="image/jpeg,image/png,image/jpg,image/webp">
        </div>

        <div class="text-center mt-2">
            <button id="predictBtn" class="btn btn-predict btn-lg px-5 text-white">
                Nhận diện
            </button>
        </div>

        <!-- Vùng xem trước ảnh -->
        <div id="previewArea" class="text-center mt-4"></div>

        <!-- Vùng kết quả -->
        <div id="resultArea" class="text-center mt-4 result"></div>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewArea = document.getElementById('previewArea');
    const predictBtn = document.getElementById('predictBtn');
    const resultArea = document.getElementById('resultArea');
    const modelSelect = document.getElementById('modelSelect');

    // Hiển thị ảnh preview
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                previewArea.innerHTML = `<img src="${ev.target.result}" class="preview-img" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        } else {
            previewArea.innerHTML = '';
        }
    });

    predictBtn.addEventListener('click', async () => {
        const file = imageInput.files[0];
        if (!file) {
            resultArea.innerHTML = '<span style="color:#c0392b;">⚠️ Vui lòng chọn ảnh trước khi nhận diện!</span>';
            return;
        }

        const model = modelSelect.value;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('model', model);

        resultArea.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Đang phân tích ảnh...';
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.prediction) {
                let fruit = data.prediction.toLowerCase();
                let fruit_pred;
                if (fruit.includes('apple')) 
                    fruit_pred = "Quả táo";
                else if (fruit.includes('pear')) 
                    fruit_pred = "Quả lê";
                else if (fruit.includes('cantaloupe')) 
                    fruit_pred = "Quả dưa gang";
                else if (fruit.includes('watermelon'))
                    fruit_pred = "Quả dưa hấu";
                else if (fruit.includes('lemon')) 
                    fruit_pred = "Quả chanh vàng";
                else if (fruit.includes('lime')) 
                    fruit_pred = "Quả chanh xanh";
                else if (fruit.includes('orange')) 
                    fruit_pred = "Quả cam";
                else if (fruit.includes('mandarine')) 
                    fruit_pred = "Quả quýt";
                else if (fruit.includes('cherry')) 
                    fruit_pred = "Quả chery";
                else if (fruit.includes('plum')) 
                    fruit_pred = "Quả mận";
                else fruit_pred = "?????";
                
                resultArea.innerHTML = `<strong>Kết quả:</strong> ${fruit_pred}`;
            } else {
                resultArea.innerHTML = `<span style="color:#c0392b;">❌ Lỗi: ${data.error || 'Không nhận diện được'}</span>`;
            }
        } catch (err) {
            console.error(err);
            resultArea.innerHTML = '<span style="color:#c0392b;">🔌 Lỗi kết nối tới server. Hãy kiểm tra lại backend (python app.py).</span>';
        }
    });
</script>
</body>
</html>
